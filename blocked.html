<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Blocked during Focus · AIHub Browser</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1a2140, #0b0f1e 60%);
      color: #e7e9f5;
    }
    .card {
      text-align: center; max-width: 460px; padding: 40px 32px;
    }
    .emoji { font-size: 62px; line-height: 1; }
    h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 18px 0 8px; }
    .site { color: #fb7185; }
    p { font-size: 15px; line-height: 1.65; color: #9aa0c0; margin: 0 auto; max-width: 40ch; }
    .hint {
      margin-top: 26px; display: inline-flex; align-items: center; gap: 8px;
      font-size: 12.5px; color: #c4b5fd; background: rgba(124,92,255,0.12);
      border: 1px solid rgba(124,92,255,0.3); border-radius: 999px; padding: 8px 16px;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #34d399; box-shadow: 0 0 8px #34d399; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎯</div>
    <h1>Blocked during Focus</h1>
    <p>You're in a focus session, so <span class="site" id="site">this site</span> is paused to help you stay on track.</p>
    <div class="hint"><span class="dot"></span> Unlocks automatically when your timer ends — or turn Focus off from the AIHub home screen.</div>
  </div>
  <script>
    try {
      const s = new URLSearchParams(location.search).get('site');
      if (s) document.getElementById('site').textContent = s;
    } catch {}
  </script>
</body>
</html>
