name: Build macOS

# Builds the unsigned universal (Intel + Apple Silicon) DMG and ZIP on a
# macOS runner — macOS apps cannot be compiled on Windows/Linux — and publishes
# them, plus the electron-updater metadata (latest-mac.yml), to the DRAFT GitHub
# Release for the pushed tag (same release the Windows job publishes to).
#
# NOTE: macOS auto-update requires a SIGNED + notarized app. These builds are
# unsigned, so mac users download updates manually from the release/website;
# the latest-mac.yml is still published so signing later enables auto-update
# with no further changes.
#
# Trigger by pushing any v* tag, or manually from the Actions tab.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate-icon

      - name: Build renderer and main
        run: npm run build

      - name: Package + publish macOS app
        run: npx electron-builder --mac --publish always
        env:
          # No Apple Developer certificate — skip identity discovery so the
          # build stays unsigned instead of failing.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # electron-builder publishes the DMG/ZIP + latest-mac.yml to the same
          # draft GitHub Release the Windows job targets for this tag.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
